<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Premium Checkout</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Stripe.js -->
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        /* Modern Glassmorphism Dark Theme */
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #f8fafc;
        }

        .checkout-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .checkout-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 24px;
            text-align: center;
            background: linear-gradient(to right, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* The Stripe Element Container */
        #payment-element {
            margin-bottom: 24px;
            min-height: 250px; /* Prevents layout shift while Stripe loads */
        }

        button {
            background: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            padding: 16px 24px;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(217, 70, 239, 0.4);
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(217, 70, 239, 0.5);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
            display: none;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="checkout-container">
        <h2>Complete Your Payment</h2>
        <form id="payment-form">
            <div id="payment-element">
                <!-- Stripe Elements will be injected here -->
            </div>
            <button id="submit">
                <span id="button-text">Pay Now</span>
                <div class="spinner" id="spinner"></div>
            </button>
            <div id="error-message"></div>
        </form>
    </div>

    <script>
        // Initialize Stripe with your test publishable key
        const stripe = Stripe('');
        
        // The client_secret from your /payments API
        const clientSecret = '';

        // Set up Stripe Elements with a night mode appearance
        const appearance = {
            theme: 'night',
            variables: {
                fontFamily: 'Inter, sans-serif',
                colorBackground: '#1e293b',
                colorPrimary: '#a855f7',
                colorText: '#f8fafc',
            }
        };

        const elements = stripe.elements({ clientSecret, appearance });
        
        // Create and mount the Payment Element
        const paymentElement = elements.create('payment');
        paymentElement.mount('#payment-element');

        // Handle Form Submission
        const form = document.getElementById('payment-form');
        const submitBtn = document.getElementById('submit');
        const btnText = document.getElementById('button-text');
        const spinner = document.getElementById('spinner');
        const errorDiv = document.getElementById('error-message');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            // UI Loading state
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            errorDiv.style.display = 'none';

            // Confirm Payment
            const { error } = await stripe.confirmPayment({
                elements,
                confirmParams: {
                    // Redirect to Swagger docs upon success for testing
                    return_url: 'http://127.0.0.1:8005/docs',
                },
            });

            if (error) {
                // Show error to your customer (e.g., insufficient funds, card declined)
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                
                // Reset UI state
                submitBtn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
